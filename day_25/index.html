<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="bg-black text-white font-[Lexend] m-0 p-0 box-border">

<!-- HEADER -->
<header id="header"
class="min-h-[60px] mx-[5%] bg-[#131313] rounded-b-[30px] sticky top-0 z-[1000]">

    <div class="flex justify-between items-center py-3 px-[3em]">

        <h2 class="text-xl font-bold">Ivander</h2>

        <!-- NAV DESKTOP -->
        <nav class="flex gap-[1.2em] max-[864px]:hidden">
            
            <a class="flex justify-center items-center w-[5rem] aspect-[2/1]
            rounded-[20px] relative overflow-hidden cursor-pointer
            transition-all duration-500
            hover:bg-red-500 hover:text-black hover:scale-105
            hover:shadow-[0_0_15px_#ff0000,0_0_30px_#ff4d4d,0_0_60px_rgba(255,0,0,0.5)]">Home</a>

            <a class="flex justify-center items-center w-[5rem] aspect-[2/1]
            rounded-[20px] relative overflow-hidden cursor-pointer
            transition-all duration-500
            hover:bg-red-500 hover:text-black hover:scale-105
            hover:shadow-[0_0_15px_#ff0000,0_0_30px_#ff4d4d,0_0_60px_rgba(255,0,0,0.5)]">About</a>

            <a class="flex justify-center items-center w-[5rem] aspect-[2/1]
            rounded-[20px] relative overflow-hidden cursor-pointer
            transition-all duration-500
            hover:bg-red-500 hover:text-black hover:scale-105
            hover:shadow-[0_0_15px_#ff0000,0_0_30px_#ff4d4d,0_0_60px_rgba(255,0,0,0.5)]">Service</a>

            <a class="flex justify-center items-center w-[5rem] aspect-[2/1]
            rounded-[20px] relative overflow-hidden cursor-pointer
            transition-all duration-500
            hover:bg-red-500 hover:text-black hover:scale-105
            hover:shadow-[0_0_15px_#ff0000,0_0_30px_#ff4d4d,0_0_60px_rgba(255,0,0,0.5)]">Project</a>

            <a class="flex justify-center items-center w-[5rem] aspect-[2/1]
            rounded-[20px] relative overflow-hidden cursor-pointer
            transition-all duration-500
            hover:bg-red-500 hover:text-black hover:scale-105
            hover:shadow-[0_0_15px_#ff0000,0_0_30px_#ff4d4d,0_0_60px_rgba(255,0,0,0.5)]">Contact</a>

        </nav>

    </div>
</header>


<!-- MAIN -->
<main id="main" class="mx-[5%] mb-[5%] mt-[0.1%]">

<!-- HOME -->
<section class="pt-[5%] flex items-center flex-row max-[768px]:flex-col max-[768px]:gap-8">

    <!-- LEFT -->
    <div class="flex-[2] flex flex-col gap-4">

        <h1 class="text-4xl font-bold">Hello I'm Ivander</h1>
        <p class="text-gray-400">Web Developer</p>

        <!-- GRID -->
        <div class="grid grid-cols-[repeat(auto-fill,minmax(9rem,1fr))] gap-2">

            <div class="aspect-square border border-[#131313] rounded-[10px]
            bg-[#131313] flex items-center justify-center
            transition duration-500
            hover:bg-[#210A09] hover:border-[#460802]">HTML</div>

            <div class="aspect-square border border-[#131313] rounded-[10px]
            bg-[#131313] flex items-center justify-center
            transition duration-500
            hover:bg-[#210A09] hover:border-[#460802]">CSS</div>

            <div class="aspect-square border border-[#131313] rounded-[10px]
            bg-[#131313] flex items-center justify-center
            transition duration-500
            hover:bg-[#210A09] hover:border-[#460802]">JS</div>

        </div>

        <!-- BUTTON -->
        <div class="flex gap-5">

            <button class="min-w-[20%] aspect-[3/1] bg-red-500 rounded-[30px]
            font-bold transition-all duration-500 hover:scale-105">
            Hire Me
            </button>

            <button class="min-w-[20%] aspect-[3/1] rounded-[30px]
            border-2 border-red-500 font-bold text-white
            bg-[linear-gradient(to_right,white_50%,transparent_50%)]
            bg-[length:200%_100%] bg-right-bottom
            transition-all duration-500 overflow-hidden
            hover:bg-left-bottom hover:text-black
            hover:scale-105
            hover:shadow-[0_0_15px_#ff0000,0_0_30px_#ff4d4d]">
            Download CV
            </button>

        </div>

    </div>

    <!-- RIGHT IMAGE -->
    <div class="flex-1 aspect-square flex justify-center items-center
    bg-[#1A1A1A] rounded-[12px]
    transition duration-500
    hover:shadow-[0_0_25px_rgba(255,0,0,0.6),0_0_50px_rgba(255,0,0,0.3)]">

        <span class="text-gray-500">Profile</span>

    </div>

</section>


<!-- SERVICE -->
<section class="mt-[15%]">

    <h2 class="text-2xl font-bold text-center">Services</h2>

    <div class="grid grid-cols-[repeat(auto-fit,minmax(200px,1fr))] gap-5 mt-9">

        <div class="flex flex-col items-center justify-center text-center
        p-6 gap-6 bg-[#131313] border border-gray-500 rounded-[24px]
        transition-all duration-700
        hover:border-red-500 hover:-translate-y-[10px]">
        Web Design
        </div>

        <div class="flex flex-col items-center justify-center text-center
        p-6 gap-6 bg-[#131313] border border-gray-500 rounded-[24px]
        transition-all duration-700
        hover:border-red-500 hover:-translate-y-[10px]">
        Web Development
        </div>

    </div>

</section>


<!-- PROJECT -->
<section class="mt-[15%]">

    <h2 class="text-2xl font-bold text-center">Projects</h2>

    <div class="mt-[5%] grid grid-cols-[repeat(auto-fit,minmax(300px,1fr))] gap-6">

        <div class="relative flex flex-col items-center justify-center
        aspect-[6/7] rounded-[16px] overflow-hidden
        bg-[#131313]
        transition-all duration-500
        hover:bg-red-500 hover:text-black hover:scale-[1.01]
        hover:shadow-[0_0_15px_#ff0000,0_0_30px_#ff4d4d,0_0_60px_rgba(255,0,0,0.5)]">
        Project
        </div>

    </div>

</section>

</main>


<!-- CONTACT / FOOTER -->
<footer id="footer" class="w-full bg-[#131313] p-12">

<div class="flex gap-8 max-[700px]:flex-col">

    <!-- DETAIL -->
    <div class="flex-1 flex flex-col gap-8">

        <div class="flex items-center bg-[#54150F] p-8 gap-8
        rounded-[2em] cursor-pointer
        transition duration-700 hover:scale-105">
        Email
        </div>

        <div class="flex items-center bg-[#54150F] p-8 gap-8
        rounded-[2em] cursor-pointer
        transition duration-700 hover:scale-105">
        WhatsApp
        </div>

    </div>

    <!-- FORM -->
    <div class="flex-1 flex flex-col gap-8">

        <input class="bg-transparent text-gray-400 p-2 rounded-[1.5rem] border border-gray-600" placeholder="Name">
        <input class="bg-transparent text-gray-400 p-2 rounded-[1.5rem] border border-gray-600" placeholder="Email">
        <textarea class="bg-transparent text-gray-400 p-2 rounded-[1.5rem] border border-gray-600" placeholder="Message"></textarea>

        <button class="bg-red-500 text-white font-bold p-2 rounded-[1.5rem]">
        Send
        </button>

    </div>

</div>

</footer>

</body>
</html>
